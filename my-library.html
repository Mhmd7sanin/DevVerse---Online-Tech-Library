<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - DevVerse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="library-container">
        <h1>My Library</h1>
        <p>Welcome to your personal tech library, Belal!</p>
        
        <div class="books-grid">
            <div class="book-card">
                <img src="https://via.placeholder.com/150" alt="Book Cover">
                <h3>Clean Code</h3>
                <p>Robert C. Martin</p>
                <button>Read Now</button>
            </div>
            
            <div class="book-card">
                <img src="https://via.placeholder.com/150" alt="Book Cover">
                <h3>JavaScript: The Good Parts</h3>
                <p>Douglas Crockford</p>
                <button>Read Now</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
