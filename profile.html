<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - DevVerse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <img src="https://ui-avatars.com/api/?name=Belal&background=4CAF50&color=fff&size=100" alt="User Avatar" class="avatar">
                <h2>Belal (Member 4)</h2>
                <p>SOC Analyst in Training</p> 
            </div>
            
            <div class="profile-details">
                <div class="stat-item">
                    <span>Books Read:</span>
                    <strong>12</strong>
                </div>
                <div class="stat-item">
                    <span>Total Points:</span>
                    <strong>450</strong>
                </div>
            </div>

            <div class="certifications">
                <h3>Badges & Certifications</h3>
                <div class="badge">
                    <span class="badge-icon">🛡️</span>
                    <span>SOC Analyst Path (Hack The Box) - Completed</span>
                </div>
                <div class="badge">
                    <span class="badge-icon">📜</span>
                    <span>CDSA Exam - Eligible</span>
                </div>
            </div>
            
            <button id="edit-profile-btn">Edit Profile</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
