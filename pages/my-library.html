<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - DevVerse</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="page-wrapper page-content">
        <div class="section-header">
            <h2>My Library</h2>
            <p style="color: var(--color-text-secondary);">Welcome to your personal tech library, Belal!</p>
        </div>
        
        <div class="book-grid">
            <div class="book-card">
                <div class="book-card__cover">
                    <img src="https://via.placeholder.com/150" alt="Book Cover">
                </div>
                <div class="book-card__body">
                    <div class="book-card__category">Programming</div>
                    <h3 class="book-card__title">Clean Code</h3>
                    <p class="book-card__author">Robert C. Martin</p>
                    <button class="btn btn-primary btn-full" style="margin-top: 10px;">Read Now</button>
                </div>
            </div>
            
            <div class="book-card">
                <div class="book-card__cover">
                    <img src="https://via.placeholder.com/150" alt="Book Cover">
                </div>
                <div class="book-card__body">
                    <div class="book-card__category">Web Dev</div>
                    <h3 class="book-card__title">JavaScript: The Good Parts</h3>
                    <p class="book-card__author">Douglas Crockford</p>
                    <button class="btn btn-primary btn-full" style="margin-top: 10px;">Read Now</button>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/script.js"></script>
</body>
</html>
