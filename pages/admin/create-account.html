<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — DevVerse</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/pages/create-account.css">
</head>

<body>

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <main class="main-content create-account-page">

    <!-- Back Link -->
    <a href="users.html" class="back-link">← Back to User Management</a>

    <!-- Card -->
    <div class="create-account-card">

      <!-- Title -->
      <h1>Create New Account</h1>
      <p>Set up a new user or administrator profile.</p>

      <!-- Top-level error alert -->
      <div class="alert alert-error" id="form-alert" style="display:none;"></div>

      <!-- Form -->
      <form id="create-form" class="create-account-fields">

        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="username">USERNAME</label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Enter username"
          >
          <span class="form-error" id="username-error"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">EMAIL ADDRESS</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="Enter email"
          >
          <span class="form-error" id="email-error"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">INITIAL PASSWORD</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter password"
          >
          <span class="form-error" id="password-error"></span>
        </div>

        <!-- Admin Checkbox -->
        <div class="form-check-box">
          <input type="checkbox" id="is-admin">
          <label for="is-admin">Grant Administrator Privileges</label>
        </div>

        <!-- Buttons -->
        <div class="create-account-actions">
          <button
            type="submit"
            id="submit-btn"
            class="btn btn-primary btn-full"
          >
            Create Account
          </button>

          <a href="users.html" class="btn btn-secondary">
            Cancel
          </a>
        </div>

      </form>

    </div>

  </main>

  <!-- Scripts -->
  <script src="../../js/storage.js"></script>
  <script src="../../js/navbar.js"></script>
  <script src="../../js/features/create-account.js"></script>

</body>
</html>
