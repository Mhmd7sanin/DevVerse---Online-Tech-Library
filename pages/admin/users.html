<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users — DevVerse</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- Global FIRST -->
  <link rel="stylesheet" href="../../css/global.css">
  <!-- Your CSS -->
  <link rel="stylesheet" href="../../css/pages/users.css">
</head>

<body>

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <main class="page-wrapper page-content">

    <!-- Page Header -->
    <div class="page-header">
      
      <div class="page-header__left">
        <h1>Manage Users</h1>
        <p>
          Total registered members:
          <span id="user-count">0</span>
        </p>
      </div>

    </div>

    <div class="catalog-controls">
      <div class="search-bar">
        <svg class="search-bar__icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="user-search" class="search-bar__input" placeholder="Search users...">
      </div>
      <a href="create-account.html" class="btn btn-primary">
          <i class="fa-solid fa-user-plus"></i>
          Add New Account
        </a>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="data-table">

        <thead>
          <tr>
            <th>USER INFO</th>
            <th>ROLE</th>
            <th>BORROWED</th>
            <th>ACTIONS</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
        </tbody>

      </table>
    </div>

  </main>


<!-- Delete Dialog -->
<div id="delete-overlay" class="dialog-overlay">
  <div class="dialog">
    <h3 class="dialog__title">Delete this user?</h3>
    <p class="dialog__body">This cannot be undone.</p>

    <div class="dialog__actions">
      <button class="btn btn-secondary" onclick="closeDeleteDialog()">Cancel</button>
      <button class="btn btn-danger" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<!-- Edit main Admin Dialog -->
<div id="edit-overlay" class="dialog-overlay">
  <div class="dialog">
    <h3 class="dialog__title">Edit Main Admin</h3>
    <p class="dialog__body">This is the main administrator account and cannot be edited.</p>

    <div class="dialog__actions">
      <button class="btn btn-primary" onclick="closeEditDialog()">OK</button>
    </div>
  </div>
</div>


  <!-- Scripts -->
  <script src="../../js/storage.js"></script>
  <script src="../../js/navbar.js"></script>
  <script src="../../js/features/admin-users.js"></script>

</body>
</html>
