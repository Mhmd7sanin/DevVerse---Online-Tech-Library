<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/pages/book-detail.css">
</head>

<body>

  <div id="navbar-container"></div>

  <div class="page-wrapper page-content">
    <div class="detail-layout">

      <!-- ── LEFT — Cover card ── -->
      <div class="detail-cover-card">
        <span id="availability-badge" class="badge"></span>
        <div class="detail-image-wrapper">
          <img id="book-img" src="" alt="Book cover">
          <div class="detail-fallback">❤</div>
        </div>
      </div>

      <!-- ── RIGHT — Book info ── -->
      <div class="detail-info">

        <a href="browse.html" class="back-link">← Back to Catalog</a>

        <p id="book-category" class="detail-category"></p>
        <h1 id="book-title" class="detail-title"></h1>
        <p id="book-author" class="detail-author"></p>

        <div class="section-divider"></div>

        <p class="detail-about-label">ABOUT THIS BOOK</p>
        <p id="book-description" class="detail-description"></p>

        <div class="section-divider"></div>

        <div class="detail-borrow-section">

          <!-- Shown when book is available or borrowed by someone else -->
          <button id="borrow-btn" class="unavailable-button" style="display:none;">
            Borrow this Book
          </button>

          <!-- Shown when the current user owns this book -->
          <div id="owned-actions" style="display:none;">
            <button id="read-btn">Read this Book</button>
            <button id="return-btn">Return this Book</button>
          </div>

        </div>

      </div>
    </div>
  </div>


  <!-- ── Return confirmation dialog ── -->
  <div id="delete-overlay" class="dialog-overlay">
    <div class="dialog">
      <h3 class="dialog__title">Confirm Return</h3>
      <p class="dialog__body">Are you sure you want to return this book?</p>
      <div class="dialog__actions">
        <button class="btn btn-secondary" onclick="closeConfirmDialog()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmReturn()">Return</button>
      </div>
    </div>
  </div>

  <!-- ── Read not implemented dialog ── -->
  <div id="read-overlay" class="dialog-overlay">
    <div class="dialog">
      <h3 class="dialog__title">Not Available Yet</h3>
      <p class="dialog__body">
        The in-app reading feature is not implemented yet.<br>
        Stay tuned for future updates!
      </p>
      <div class="dialog__actions">
        <button class="btn btn-primary" onclick="closeReadDialog()">Got it</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="../../js/storage.js"></script>
  <script src="../../js/seed.js"></script>
  <script src="../../js/navbar.js"></script>
  <script src="../../js/features/book-detail.js"></script>
  <script>initPage();</script>

</body>
</html>
