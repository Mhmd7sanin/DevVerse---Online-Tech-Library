<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Detail</title>

  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/pages/book-detail.css">
</head>

<body>

  <a href="browse.html" class="back-link">← Back to Catalog</a>
<div class="detail-layout">

  <!-- LEFT -->

  <div class="detail-cover-card">
    <span id="availability-badge">ex</span>
    <img src="c:\\Users\\MH\\Desktop\\ff.png" alt="">
  </div>

  <!-- RIGHT -->
  <div>

    <p id="book-category" class="detail-category"></p>
    <h1 id="book-title" class="detail-title">ex</h1>
    <p id="book-author" class="detail-author"></p>
    <hr>
    <p class="detail-about-label">ABOUT THIS BOOK</p>
    <p id="book-description" class="detail-description"></p>
    <br>
    <hr>

    <div class="detail-borrow-section">
      <button id="borrow-btn" class="unavailable-button" onclick="handleBorrow()">Borrow this Book</button>
    </div>

</div>

<script src="../../js/storage.js"></script>
<script src="../../js/features/book-detail.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const bookId = params.get('id');
      const book = getBookById(bookId);

      availableButton(book.isAvailable);

      isavailable(book.isAvailable);

      document.getElementById('book-title').textContent = book.name;
      document.getElementById('book-author').textContent = book.author;
      document.getElementById('book-category').textContent = book.category;
      document.getElementById('book-description').textContent = book.description;
    });
  </script>

</body>
</html>
